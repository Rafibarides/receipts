<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  :root {
    --ink: #1c2118;
    --muted: #6b7566;
    --line: #d8ddd2;
    --field: #ffffff;
    --paper: #f3f4ef;
    --green: #274e13;
    --alert: #9b2c1f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 16px 48px;
    background: var(--paper); color: var(--ink);
    font: 16px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 520px; margin: 0 auto; }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
  .sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
  label { display: block; margin: 16px 0 6px; font-size: 13px; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; color: var(--muted); }
  input, select, textarea, button {
    font: inherit; width: 100%;
    padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--field); color: var(--ink);
  }
  textarea { min-height: 78px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--green); outline-offset: 1px; border-color: var(--green); }
  .file-row { display: flex; gap: 8px; }
  .file-row input[type=file] { padding: 8px; }
  #preview { display: none; margin-top: 10px; width: 100%; max-height: 220px; object-fit: contain; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  button.primary {
    margin-top: 24px; background: var(--green); color: #fff; border-color: var(--green);
    font-weight: 600; cursor: pointer; padding: 13px;
  }
  button.primary:disabled { opacity: .6; cursor: default; }
  .msg { margin-top: 14px; font-size: 14px; padding: 10px 12px; border-radius: 8px; display: none; }
  .msg.ok { display: block; background: #e6f0e0; color: var(--green); }
  .msg.err { display: block; background: #f7e3e0; color: var(--alert); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Add a receipt</h1>
  <p class="sub">Logs to the Barides Receipt List. Photos are stored in R2 and linked in the row.</p>

  <label for="date">Date of purchase</label>
  <input id="date" type="date">

  <label for="amount">Purchase amount</label>
  <input id="amount" type="number" step="0.01" min="0" inputmode="decimal" placeholder="0.00">

  <label for="category">Category</label>
  <select id="category"><option value="">Loading categories…</option></select>

  <label for="description">Description</label>
  <textarea id="description" placeholder="What was bought, and where"></textarea>

  <label for="photo">Receipt photo</label>
  <div class="file-row">
    <input id="photo" type="file" accept="image/*" capture="environment">
  </div>
  <img id="preview" alt="Receipt preview">

  <button id="save" class="primary">Save receipt</button>
  <div id="msg" class="msg"></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let photoData = null;

  $('date').value = new Date().toISOString().slice(0, 10);

  google.script.run.withSuccessHandler(cats => {
    const sel = $('category');
    sel.innerHTML = '<option value="">Select a category</option>';
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }).getCategories();

  $('photo').addEventListener('change', e => {
    const file = e.target.files[0];
    photoData = null;
    if (!file) { $('preview').style.display = 'none'; return; }
    const reader = new FileReader();
    reader.onload = () => {
      photoData = {
        base64: reader.result.split(',')[1],
        name: file.name,
        mimeType: file.type || 'image/jpeg'
      };
      $('preview').src = reader.result;
      $('preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  function show(kind, text) {
    const m = $('msg');
    m.className = 'msg ' + kind;
    m.textContent = text;
  }

  $('save').addEventListener('click', () => {
    if (!$('category').value) { show('err', 'Pick a category before saving.'); return; }
    if (!$('amount').value)   { show('err', 'Enter the purchase amount.'); return; }

    $('save').disabled = true;
    show('ok', 'Saving…');

    google.script.run
      .withSuccessHandler(res => {
        $('save').disabled = false;
        if (!res.ok) { show('err', res.error); return; }
        show('ok', 'Saved ' + res.id);
        $('amount').value = '';
        $('description').value = '';
        $('photo').value = '';
        $('preview').style.display = 'none';
        photoData = null;
      })
      .withFailureHandler(err => {
        $('save').disabled = false;
        show('err', err.message || String(err));
      })
      .addReceipt({
        date: $('date').value,
        amount: $('amount').value,
        category: $('category').value,
        description: $('description').value,
        photo: photoData
      });
  });
</script>
</body>
</html>
